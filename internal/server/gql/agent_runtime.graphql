type AgentInstanceDeployment {
    directory: String
    dockerContainerName: String
    axonhubBaseUrl: String
}

input AgentInstanceDeploymentInput {
    directory: String
    dockerContainerName: String
    axonhubBaseUrl: String
}

input DeployAxonclawInput {
    agentID: ID!
    runtimeID: ID!
    name: String!
    directory: String
    axonhubBaseUrl: String
}

type DeployAxonclawResult {
    success: Boolean!
    error: String
    instance: AgentInstance
}

type ControlAxonclawInstanceResult {
    success: Boolean!
    error: String
    instance: AgentInstance
}

extend type Mutation {
    createAgentRuntime(input: CreateAgentRuntimeInput!): AgentRuntime!
    updateAgentRuntime(id: ID!, input: UpdateAgentRuntimeInput!): AgentRuntime!
    updateAgentRuntimeStatus(id: ID!, status: AgentRuntimeStatus!): AgentRuntime!
    deleteAgentRuntime(id: ID!): Boolean!
    bulkDeleteAgentRuntimes(ids: [ID!]!): Boolean!
    bulkUpdateAgentRuntimeStatus(ids: [ID!]!, status: AgentRuntimeStatus!): Boolean!
    testAgentRuntimeConnection(id: ID!): AgentRuntimeTestResult!
    deployAxonclaw(input: DeployAxonclawInput!): DeployAxonclawResult!

    stopAxonclawInstance(instanceID: ID!): ControlAxonclawInstanceResult!
    startAxonclawInstance(instanceID: ID!): ControlAxonclawInstanceResult!
    restartAxonclawInstance(instanceID: ID!): ControlAxonclawInstanceResult!
    redeployAxonclawInstance(instanceID: ID!, axonhubBaseUrl: String): ControlAxonclawInstanceResult!
}

type AgentRuntimeTestResult {
    success: Boolean!
    error: String
    latency: Int
}

extend type Query {
    agentRuntime(id: ID!): AgentRuntime
}

extend type AgentRuntime {
  """
  Runtime password for authentication. Sensitive: will be null if user can not access.
  """
  password: String @goField(forceResolver: true)

    """
  SSH private key for authentication. Sensitive: will be null if user can not access.
  """
  sshPrivateKey: String @goField(forceResolver: true)
}

name: AxonClaw Release

on:
  push:
    tags:
      - 'axonclaw-v*'

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean -f cmd/axonclaw/.goreleaser.yml
          workdir: cmd/axonclaw
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#axonclaw-v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building axonclaw docker version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cmd/axonclaw/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            looplj/axonclaw:${{ env.VERSION }}
            looplj/axonclaw:latest
          build-args: |
            VERSION=${{ env.VERSION }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}

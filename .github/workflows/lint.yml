name: Lint
on:
  push:
    branches:
      - 'unstable'
      - 'release/**'
  pull_request:
    branches:
      - 'unstable'
      - 'release/**'
env:
  GO111MODULE: on
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          stable: true
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: ./
          args: --timeout 10m --max-same-issues 50 --new ./...

  lint-axon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go

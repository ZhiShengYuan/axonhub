scalar Time
scalar JSONRawMessage
scalar JSONRawMessageInput

enum AgentSkillAddPolicy {
  open
  approval_required
  registry_only
}

type AgentSkillsPolicy {
  add: AgentSkillAddPolicy!
}

type AgentBuiltinTool {
  name: String!
  enabled: Boolean!
  order: Int!
  config: JSONRawMessage
}

type AgentToolDefinition {
  name: String!
  description: String!
  parameters: JSONRawMessage!
  config: JSONRawMessage
}

type AgentSkillDefinition {
  name: String!
  content: String
  entrypoint: String
  args: String
}

type AgentBootstrap {
  agentID: ID!
  agentName: String!
  model: String
  systemPrompt: String!
  tools: [AgentToolDefinition!]!
  skills: [AgentSkillDefinition!]!
  builtinTools: [AgentBuiltinTool!]!
  skillsPolicy: AgentSkillsPolicy!
  memoryPolicy: JSONRawMessage
}

enum AgentMessageDirection { to_runtime to_user }
enum AgentMessageStatus { pending acked expired }
enum AgentMessageSenderType { user runtime system }
enum AgentMessageKind { chat approval_request approval_result system_event }

input RegisterAgentInstanceInput {
  instanceID: String!
  name: String
  platform: String
  version: String
  threadID: String
}

type AgentInstance {
  id: ID!
  agentID: ID!
  instanceID: String!
  lastHeartbeatAt: Time!
}

input HeartbeatAgentInstanceInput {
  instanceID: String!
}

# PeerAgent represents a discoverable agent instance in the same project.
type PeerAgent {
  agentID: ID!
  name: String!
  status: String!
  instanceID: String!
}

# SendAgentMessageInput is used when an agent sends a message to another agent.
# Direction: to_agent, SenderType: agent
input SendAgentMessageInput {
  targetAgentID: ID!
  targetInstanceID: String!
  text: String!
  content: JSONRawMessageInput
  kind: AgentMessageKind = chat
  correlationID: String = ""
}

# ReplyMessageInput is used when an agent instance replies to the user.
# Direction: to_user, SenderType: agent
input ReplyMessageInput {
  instanceID: String!
  text: String!
  content: JSONRawMessageInput
  kind: AgentMessageKind = chat
  correlationID: String = ""
}

type AgentMessage {
  id: ID!
  agentID: ID!
  direction: AgentMessageDirection!
  senderType: AgentMessageSenderType!
  text: String!
  content: JSONRawMessage!
  kind: AgentMessageKind!
  correlationID: String!
  sequence: Int!
  status: AgentMessageStatus!
  createdAt: Time!
}

input PullAgentMessagesInput {
  instanceID: String!
  afterSequence: Int
  limit: Int = 50
  kindIn: [AgentMessageKind!]
  correlationID: String
}

input AckAgentMessagesInput {
  instanceID: String!
  messageIDs: [ID!]!
}

type Query {
  agentBootstrap: AgentBootstrap!
  peerAgents: [PeerAgent!]!
  pullAgentMessages(input: PullAgentMessagesInput!): [AgentMessage!]!
  pullAgentMessagesToUser(afterSequence: Int, limit: Int = 50): [AgentMessage!]!
}

type Mutation {
  registerAgentInstance(input: RegisterAgentInstanceInput!): AgentInstance!

  heartbeatAgentInstance(input: HeartbeatAgentInstanceInput!): Boolean!

  # Send a message from this agent to another agent (Direction: to_agent, SenderType: agent)
  sendAgentMessage(input: SendAgentMessageInput!): AgentMessage!
  # Reply to the user (Direction: to_user, SenderType: agent)
  replyMessage(input: ReplyMessageInput!): AgentMessage!
  # Acknowledge messages have been received/processed by an agent instance.
  # Updates message status from 'pending' to 'acked'.
  ackAgentMessages(input: AckAgentMessagesInput!): Boolean!
}

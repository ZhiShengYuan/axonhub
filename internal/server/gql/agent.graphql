"""
Agent management (admin GraphQL).
"""

input AgentSkillsPolicyInput {
  add: String!
}

input AgentBuiltinToolInput {
  name: String!
  enabled: Boolean! = true
  order: Int! = 0
}

input CreateAgentInput {
  name: String!
  description: String
  status: AgentStatus
  model: String
  systemPrompt: String!
  builtinTools: [AgentBuiltinToolInput!]
  skillsPolicy: AgentSkillsPolicyInput
}

input UpdateAgentInput {
  name: String
  description: String
  status: AgentStatus
  model: String
  systemPrompt: String
  builtinTools: [AgentBuiltinToolInput!]
  skillsPolicy: AgentSkillsPolicyInput
}

extend type Mutation {
  createAgent(input: CreateAgentInput!): Agent!
  updateAgent(id: ID!, input: UpdateAgentInput!): Agent!
  deleteAgent(id: ID!): Boolean!

  """
  Send a user message to the agent runtime (stored as to_runtime pending message).
  Web UI uses this to relay messages to axonclaw via pull+ack.
  """
  sendAgentMessage(input: SendAgentMessageInput!): AgentChatMessage!

  """
  Resolve a pending approval request by publishing an approval_result message to the runtime.
  """
  resolveApproval(input: ResolveApprovalInput!): Boolean!

  """
  Acknowledge messages have been received by the user.
  Updates message status from 'pending' to 'acked'.
  """
  ackAgentMessages(input: AckAgentMessagesInput!): Boolean!
}

"""
Minimal message view for Agent thread chat in Web UI.
"""
type AgentChatMessage {
  id: ID!
  agentID: ID!
  direction: AgentMessageDirection!
  senderType: AgentMessageSenderType!
  senderID: Int
  kind: AgentMessageKind!
  correlationID: String!
  content: JSONRawMessage!
  text: String!
  sequence: Int!
  status: AgentMessageStatus!
  createdAt: Time!
}

"""
Approval request view for IM/Web operator surfaces.

Backed by agent_messages(kind=approval_request, direction=to_user, status=pending).
"""
type AgentApprovalRequestMessage {
  id: ID!
  agentID: ID!
  correlationID: String!
  content: JSONRawMessage!
  sequence: Int!
  createdAt: Time!
}

input SendAgentMessageInput {
  agentID: ID!
  text: String!
}

enum ApprovalScope { once thread workspace }

input ResolveApprovalInput {
  agentID: ID!
  requestID: String!
  granted: Boolean!
  scope: ApprovalScope = once
  reason: String
}

input AckAgentMessagesInput {
  agentID: ID!
  messageIDs: [ID!]!
}

extend type Query {
  """
  Pull pending messages from runtime to user (direction=to_user, status=pending).
  """
  pullAgentMessagesToUser(agentID: ID!, afterSequence: Int, limit: Int = 50): [AgentChatMessage!]!

  """
  Pull pending approval requests (kind=approval_request, direction=to_user, status=pending).
  """
  pullAgentApprovalRequests(agentID: ID!, afterSequence: Int, limit: Int = 50): [AgentApprovalRequestMessage!]!

  """
  List messages for an agent (both directions), ordered by sequence asc.
  """
  agentChatMessages(agentID: ID!, afterSequence: Int, limit: Int = 200): [AgentChatMessage!]!
}

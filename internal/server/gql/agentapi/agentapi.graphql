scalar Time
scalar JSONRawMessage
scalar JSONRawMessageInput

enum AgentSkillAddPolicy {
  open
  approval_required
  registry_only
}

type AgentSkillsPolicy {
  add: AgentSkillAddPolicy!
}

type AgentBuiltinTool {
  name: String!
  enabled: Boolean!
  order: Int!
  config: JSONRawMessage
}

type AgentToolDefinition {
  name: String!
  description: String!
  parameters: JSONRawMessage!
  config: JSONRawMessage
}

type AgentSkillDefinition {
  name: String!
  content: String
  entrypoint: String
  args: String
}

type AgentBootstrap {
  agentID: ID!
  agentName: String!
  agentInstanceName: String!
  createdByUserName: String!
  model: String
  reasoningEffort: String!
  systemPrompt: String!
  tools: [AgentToolDefinition!]!
  skills: [AgentSkillDefinition!]!
  builtinTools: [AgentBuiltinTool!]!
  skillsPolicy: AgentSkillsPolicy!
  memoryPolicy: JSONRawMessage
}

enum AgentMessageDirection { to_runtime to_user }
enum AgentMessageStatus { pending acked expired }
enum AgentMessageSenderType { user runtime system }
enum AgentMessageType { chat approval_request approval_result system_event }

input RegisterAgentInstanceInput {
  platform: String
  threadID: String
}

type AgentInstance {
  id: ID!
  agentID: ID!
  lastHeartbeatAt: Time!
}

input HeartbeatAgentInstanceInput {
  dummy: Boolean
}

# PeerAgent represents a discoverable agent instance in the same project.
type PeerAgent {
  agentID: ID!
  agentInstanceID: ID!
  name: String!
  description: String!
  status: String!
}

# SendAgentMessageInput is used when an agent sends a message to another agent.
# Direction: to_agent, SenderType: agent
input SendAgentMessageInput {
  # Required: The ID of the target agent to send the message to.
  targetAgentID: ID!

  # Optional: Specify the target agent instance ID to send the message to.
  # If not provided, the message will be sent to all instances of the target agent.
  targetAgentInstanceID: ID
  
  # Required: The text content of the message.
  text: String!

  # Optional: The JSON content of the message.
  content: JSONRawMessageInput
}

# ReplyMessageInput is used when an agent instance replies to the user.
# Direction: to_user, SenderType: agent
input ReplyMessageInput {
  text: String!
  content: JSONRawMessageInput
  type: AgentMessageType = chat
  correlationID: String = ""
  replyToMessageID: ID
}

type AgentMessage {
  id: ID!
  agentID: ID!
  direction: AgentMessageDirection!
  senderType: AgentMessageSenderType!
  text: String!
  content: JSONRawMessage!
  type: AgentMessageType!
  correlationID: String!
  externalMessageID: String
  replyToMessageID: ID
  sequence: Int!
  status: AgentMessageStatus!
  createdAt: Time!
}

input PullAgentMessagesInput {
  afterSequence: Int
  limit: Int = 50
  typeIn: [AgentMessageType!]
  correlationID: String
}

input AckAgentMessagesInput {
  messageIDs: [ID!]!
}

input DeployAxonClawInput {
  name: String!
}

type DeployAxonClawResult {
  success: Boolean!
  error: String
  instance: AgentInstance
}

type ModelCapabilities {
  vision: Boolean!
  toolCall: Boolean!
  reasoning: Boolean!
}

type ModelPricing {
  input: Float!
  output: Float!
  cacheRead: Float!
  cacheWrite: Float!
}

type AvailableModel {
  id: String!
  name: String!
  ownedBy: String!
  type: String!
  icon: String!
  description: String
  contextLength: Int!
  maxOutputTokens: Int!
  capabilities: ModelCapabilities
  pricing: ModelPricing
}

type Query {
  agentBootstrap: AgentBootstrap!
  peerAgents: [PeerAgent!]!
  pullAgentMessages(input: PullAgentMessagesInput!): [AgentMessage!]!
  pullAgentMessagesToUser(afterSequence: Int, limit: Int = 50): [AgentMessage!]!
  availableModels: [AvailableModel!]!
}

type Mutation {
  registerAgentInstance(input: RegisterAgentInstanceInput!): AgentInstance!

  heartbeatAgentInstance(input: HeartbeatAgentInstanceInput!): Boolean!

  sendAgentMessage(input: SendAgentMessageInput!): AgentMessage!
  
  replyMessage(input: ReplyMessageInput!): AgentMessage!
  ackAgentMessages(input: AckAgentMessagesInput!): Boolean!

  deployAxonClaw(input: DeployAxonClawInput!): DeployAxonClawResult!
}

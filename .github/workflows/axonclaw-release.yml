name: AxonClaw Release

on:
  push:
    tags:
      - 'axonclaw-v*'

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Extract version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#axonclaw-v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building axonclaw version: $VERSION"

      - name: Build binary
        working-directory: cmd/axonclaw
        run: |
          OUTPUT="axonclaw_${{ matrix.os }}_${{ matrix.arch }}"
          if [[ "${{ matrix.os }}" == "windows" ]]; then
            OUTPUT="${OUTPUT}.exe"
          fi

          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
            go build \
            -ldflags "-s -w -X github.com/looplj/axonhub/cmd/axonclaw/build.Version=${VERSION} -X github.com/looplj/axonhub/cmd/axonclaw/build.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) -X github.com/looplj/axonhub/cmd/axonclaw/build.GitCommit=${GITHUB_SHA::7}" \
            -o "${OUTPUT}" \
            .

          # Create archive
          if [[ "${{ matrix.os }}" == "windows" ]]; then
            ARCHIVE="axonclaw_${{ matrix.os }}_${{ matrix.arch }}.zip"
            zip -j "${ARCHIVE}" "${OUTPUT}" install.bat start.bat stop.bat restart.bat start.ps1 stop.ps1 restart.ps1
          else
            ARCHIVE="axonclaw_${{ matrix.os }}_${{ matrix.arch }}.tar.gz"
            tar -czf "${ARCHIVE}" "${OUTPUT}" install.sh start.sh stop.sh restart.sh
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: axonclaw_${{ matrix.os }}_${{ matrix.arch }}
          path: cmd/axonclaw/axonclaw_*.*
          if-no-files-found: error

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#axonclaw-v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building axonclaw docker version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cmd/axonclaw/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            looplj/axonclaw:${{ env.VERSION }}
            looplj/axonclaw:latest
          build-args: |
            VERSION=${{ env.VERSION }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}

  release:
    needs: [build-binaries, build-docker]
    runs-on: ubuntu-latest
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: axonclaw_*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          name: AxonClaw ${{ github.ref_name }}

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm vite build
        working-directory: frontend

      - name: Copy frontend dist to server static
        run: |
          rm -rf internal/server/static/dist/assets
          mkdir -p internal/server/static/dist
          cp -r frontend/dist/* internal/server/static/dist/

      - name: Build binary (linux/amd64)
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build \
            -ldflags "-s -w \
              -X 'github.com/looplj/axonhub/internal/build.Version=${GITHUB_REF_NAME}' \
              -X 'github.com/looplj/axonhub/internal/build.Commit=${GITHUB_SHA::8}' \
              -X 'github.com/looplj/axonhub/internal/build.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)'" \
            -tags=nomsgpack \
            -o axonhub-linux-amd64 \
            ./cmd/axonhub

      - name: Build binary (linux/arm64)
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build \
            -ldflags "-s -w \
              -X 'github.com/looplj/axonhub/internal/build.Version=${GITHUB_REF_NAME}' \
              -X 'github.com/looplj/axonhub/internal/build.Commit=${GITHUB_SHA::8}' \
              -X 'github.com/looplj/axonhub/internal/build.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)'" \
            -tags=nomsgpack \
            -o axonhub-linux-arm64 \
            ./cmd/axonhub

      - name: Package release archives
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p release

          for ARCH in amd64 arm64; do
            PKG="axonhub-${VERSION}-linux-${ARCH}"
            mkdir -p "/tmp/${PKG}"

            cp "axonhub-linux-${ARCH}" "/tmp/${PKG}/axonhub"
            cp LICENSE      "/tmp/${PKG}/" 2>/dev/null || true
            cp CHANGELOG.md "/tmp/${PKG}/" 2>/dev/null || true
            cp config.schema.json "/tmp/${PKG}/" 2>/dev/null || true

            # Deploy scripts
            for f in deploy/*.sh deploy/*.ps1 deploy/*.bat; do
              [ -f "$f" ] && cp "$f" "/tmp/${PKG}/"
            done

            cd /tmp
            tar czf "${GITHUB_WORKSPACE}/release/${PKG}.tar.gz" "${PKG}/"
            cd "${GITHUB_WORKSPACE}"
            rm -rf "/tmp/${PKG}"
          done

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ASSETS=()

          for f in release/*.tar.gz; do
            ASSETS+=("$f")
          done

          gh release create "${TAG}" \
            --draft \
            --title "${TAG}" \
            --notes "Release ${TAG}" \
            "${ASSETS[@]}"
